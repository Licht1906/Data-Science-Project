version: "3.9"

# ============================================================
# Tiki Fake Review — Docker Compose (N1)
# Stack: PostgreSQL 16 + Apache Airflow 2.9 (LocalExecutor)
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Connection tới DB Tiki (N2/N3/N4/N5 dùng PostgresHook với conn_id="tiki_data")
    AIRFLOW_CONN_TIKI_DATA: postgresql://${TIKI_DB_USER}:${TIKI_DB_PASSWORD}@postgres:5432/${TIKI_DB_NAME}
    # Biến môi trường chia sẻ cho DAG
    TIKI_DATA_DB: ${TIKI_DB_NAME}
    MODEL_PATH: /opt/airflow/models/fake_review_model.pkl
  volumes:
    - ./dags:/opt/airflow/dags
    - ./crawlers:/opt/airflow/crawlers
    - ./src:/opt/airflow/src
    - ./models:/opt/airflow/models
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - tiki-net

services:
  # ----------------------------------------------------------
  # PostgreSQL 16 — lưu cả Airflow metadata và dữ liệu Tiki
  # ----------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: tiki_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB} # DB mặc định (airflow meta)
      TIKI_DB_NAME: ${TIKI_DB_NAME}
      TIKI_DB_USER: ${TIKI_DB_USER}
      TIKI_DB_PASSWORD: ${TIKI_DB_PASSWORD}
      AIRFLOW_DB_NAME: ${AIRFLOW_DB_NAME}
      AIRFLOW_DB_USER: ${AIRFLOW_DB_USER}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tiki-net

  # ----------------------------------------------------------
  # Airflow — init (chạy 1 lần rồi exit)
  # ----------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: tiki_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname Tiki \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL} || true
        echo "Airflow init done."
    restart: "no"

  # ----------------------------------------------------------
  # Airflow Webserver  →  http://localhost:8080
  # ----------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: tiki_airflow_webserver
    restart: unless-stopped
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ----------------------------------------------------------
  # Airflow Scheduler
  # ----------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: tiki_airflow_scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ----------------------------------------------------------
  # FastAPI (N2) — http://localhost:8000
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: tiki_api
    restart: unless-stopped
    environment:
      MODEL_PATH: /app/models/fake_review_model.pkl
      TIKI_DB_DSN: postgresql://${TIKI_DB_USER}:${TIKI_DB_PASSWORD}@postgres:5432/${TIKI_DB_NAME}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./models:/app/models:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tiki-net

volumes:
  postgres-data:
  airflow-logs:
  airflow-plugins:

networks:
  tiki-net:
    driver: bridge
